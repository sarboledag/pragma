{% extends "base.html" %}

{% block title %}Editar Usuario | Pragma OCR{% endblock %}

{% block content %}
<h1>Editar usuario {{ perfil.user.username }}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Guardar cambios</button>
    <a class="btn btn-secondary" href="{% url 'admin_panel:admin_usuarios' %}">Volver</a>
</form>
{% endblock %}
