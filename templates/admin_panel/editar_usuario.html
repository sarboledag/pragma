{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Editar Usuario" %} | Pragma OCR{% endblock %}

{% block content %}
<h1>{% trans "Editar usuario" %} {{ perfil.user.username }}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">{% trans "Guardar cambios" %}</button>
    <a class="btn btn-secondary" href="{% url 'admin_panel:admin_usuarios' %}">{% trans "Volver" %}</a>
</form>
{% endblock %}
