{% extends "base.html" %}

{% block title %}Iniciar Sesión | Pragma OCR{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card card">
        <div class="text-center mb-4">
            <div class="login-logo mb-3">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="#FDD835"/>
                    <path d="M10 10V22M10 10H16C18.2091 10 20 11.7909 20 14C20 16.2091 18.2091 18 16 18H10M16 18L22 22" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="h3">Bienvenido a Pragma</h1>
            <p class="text-muted small">Ingresa tus credenciales para acceder al sistema de conciliación OCR.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label fw-bold small text-uppercase">Usuario</label>
                <input type="text" name="username" id="id_username" class="form-control" required placeholder="tu_usuario">
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label fw-bold small text-uppercase">Contraseña</label>
                <input type="password" name="password" id="id_password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar al Sistema</button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">¿Problemas para ingresar? Contacta a soporte.</p>
        </div>
    </div>
</div>

<style>
    /* Override base styles for login to center everything */
    body {
        background-color: #F3F4F6;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .sidebar { display: none; }
    .main-content { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
    .container { max-width: 100% !important; }

    .login-page {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #FDD835 0%, #F57C00 100%);
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        padding: 3rem !important;
        border-radius: 24px !important;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
    }

    .login-logo {
        display: inline-flex;
        background: black;
        padding: 0.75rem;
        border-radius: 16px;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #E5E7EB;
        border-radius: 10px;
        transition: var(--transition);
    }
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.1);
    }

    .w-100 { width: 100%; }
    .py-2 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
</style>
{% endblock %}
